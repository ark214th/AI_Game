<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#ffcfec">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>ミミの にじいろ大冒険</title>
  <style>
    :root { color-scheme: light; }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body { width:100%; height:100%; overflow:hidden; overscroll-behavior:none; }
    body {
      margin:0;
      background:#ffdaef;
      font-family:"Hiragino Maru Gothic ProN","Yu Gothic",system-ui,sans-serif;
      touch-action:none;
      user-select:none;
      -webkit-user-select:none;
      -webkit-touch-callout:none;
    }
    #game { position:fixed; inset:0; overflow:hidden; background:#9eeaff; }
    canvas { width:100%; height:100%; display:block; touch-action:none; }
    button { font:inherit; border:0; cursor:pointer; touch-action:none; }
    #touchControls { position:absolute; inset:0; pointer-events:none; z-index:5; }
    #movePad {
      position:absolute;
      left:max(22px,env(safe-area-inset-left));
      bottom:max(20px,env(safe-area-inset-bottom));
      display:flex;
      align-items:center;
      gap:clamp(14px,2vw,24px);
      pointer-events:none;
    }
    .move, #jumpBtn {
      width:clamp(76px,11vw,118px);
      height:clamp(76px,11vw,118px);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0;
      border-radius:50%;
      color:#7b426e;
      background:rgba(255,255,255,.78);
      border:5px solid rgba(255,135,195,.75);
      box-shadow:0 8px 0 rgba(172,91,142,.35),0 12px 25px rgba(98,60,98,.2);
      font-size:clamp(34px,6vw,58px);
      font-weight:900;
      line-height:1;
      pointer-events:auto;
    }
    .move { position:relative; }
    .move:active, .move.pressed, #jumpBtn:active, #jumpBtn.pressed { transform:translateY(5px) scale(.96); box-shadow:0 3px 0 rgba(172,91,142,.35); background:#fff; }
    #jumpBtn {
      position:absolute;
      bottom:max(20px,env(safe-area-inset-bottom));
      right:max(26px,env(safe-area-inset-right));
      flex-direction:column;
      background:rgba(255,244,173,.88);
      border-color:rgba(255,167,89,.85);
      color:#a45642;
      line-height:1;
    }
    #jumpBtn .jumpArrow { display:block; height:.8em; line-height:.8; }
    #jumpBtn small {
      display:block;
      margin-top:5px;
      font-size:clamp(11px,1.6vw,17px);
      line-height:1;
      white-space:nowrap;
      writing-mode:horizontal-tb;
    }
    #soundBtn {
      position:absolute;
      z-index:8;
      top:max(14px,env(safe-area-inset-top));
      right:max(14px,env(safe-area-inset-right));
      width:50px;
      height:50px;
      border-radius:50%;
      background:rgba(255,255,255,.8);
      color:#794f79;
      font-size:25px;
      box-shadow:0 4px 12px rgba(75,42,80,.17);
    }
    .screen {
      position:absolute;
      z-index:10;
      inset:0;
      display:grid;
      place-items:center;
      padding:max(18px,env(safe-area-inset-top)) max(18px,env(safe-area-inset-right)) max(18px,env(safe-area-inset-bottom)) max(18px,env(safe-area-inset-left));
      background:linear-gradient(180deg,rgba(150,232,255,.6),rgba(255,211,237,.86));
      transition:opacity .3s ease;
    }
    .screen.hidden { opacity:0; pointer-events:none; }
    .panel {
      width:min(650px,94vw);
      max-height:94vh;
      overflow:auto;
      text-align:center;
      padding:clamp(22px,4vw,40px);
      border:5px solid #fff;
      border-radius:38px;
      background:rgba(255,252,249,.94);
      box-shadow:0 22px 60px rgba(116,70,113,.22),inset 0 0 0 5px #ffd2e9;
    }
    .hero-face { font-size:clamp(62px,11vh,110px); line-height:1; filter:drop-shadow(0 7px 0 #ffd1e6); }
    h1 { margin:10px 0 8px; color:#d95094; font-size:clamp(30px,6vw,55px); line-height:1.14; text-shadow:0 3px #fff; }
    .lead { margin:0 0 18px; color:#78526e; font-size:clamp(15px,2.5vw,22px); font-weight:700; line-height:1.6; }
    .howto { display:flex; justify-content:center; gap:12px; flex-wrap:wrap; margin:14px 0 22px; }
    .howto span { padding:9px 14px; border-radius:18px; color:#784d6f; background:#fff0f7; font-weight:800; font-size:clamp(13px,2vw,18px); }
    .stage-select { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; margin:12px 0 18px; }
    .stage-choice {
      min-width:0;
      padding:10px 4px;
      border:3px solid transparent;
      border-radius:18px;
      background:#f7edf5;
      color:#835675;
      font-weight:900;
      line-height:1.2;
    }
    .stage-choice.selected { border-color:#ff72b3; background:#fff3b9; transform:translateY(-2px); }
    .stage-choice b { display:block; font-size:clamp(23px,4vw,35px); }
    .stage-choice span { display:block; margin-top:3px; font-size:clamp(10px,1.5vw,14px); white-space:nowrap; }
    .primary {
      min-width:min(330px,80vw);
      padding:17px 28px;
      border-radius:999px;
      color:white;
      background:linear-gradient(180deg,#ff80bd,#e94e98);
      box-shadow:0 8px 0 #b83b79,0 13px 24px rgba(188,57,124,.25);
      font-weight:900;
      font-size:clamp(20px,3.5vw,29px);
    }
    .primary:active { transform:translateY(6px); box-shadow:0 2px 0 #b83b79; }
    .secondary { margin-top:16px; padding:10px 20px; color:#9b4f7d; background:transparent; font-weight:900; font-size:16px; }
    #resultTitle { font-size:clamp(34px,6vw,58px); }
    #resultText { font-size:clamp(17px,2.5vw,22px); line-height:1.7; color:#77536e; font-weight:800; margin:8px 0 20px; }
    #portraitTip {
      display:none;
      position:absolute;
      z-index:30;
      inset:0;
      place-items:center;
      padding:28px;
      text-align:center;
      background:#ffdbef;
      color:#984d7b;
      font-weight:900;
      font-size:25px;
      line-height:1.7;
    }
    #portraitTip b { display:block; font-size:72px; }
    @media (orientation:portrait) and (max-width:700px) { #portraitTip { display:grid; } }
    @media (pointer:fine) { .move, #jumpBtn { opacity:.63; } }
  </style>
</head>
<body>
  <main id="game" aria-label="ミミのにじいろ大冒険">
    <canvas id="canvas" width="1280" height="720"></canvas>

    <div id="touchControls" aria-label="ゲーム操作">
      <div id="movePad">
        <button id="leftBtn" class="move" aria-label="ひだりへ進む">◀</button>
        <button id="rightBtn" class="move" aria-label="みぎへ進む">▶</button>
      </div>
      <button id="jumpBtn" aria-label="ジャンプする"><span class="jumpArrow">↑</span><small>ジャンプ</small></button>
    </div>
    <button id="soundBtn" aria-label="音を消す">♪</button>

    <section id="titleScreen" class="screen">
      <div class="panel">
        <div class="hero-face">🐰🎀</div>
        <h1>ミミの<br>にじいろ大冒険</h1>
        <p class="lead">にじのカケラを あつめて<br>5つのせかいを ぼうけんしよう！</p>
        <div class="howto">
          <span>◀ ▶ で あるく</span>
          <span>↑ で ジャンプ</span>
          <span>↑を おしつづけても 2だんジャンプ</span>
        </div>
        <div id="stageSelect" class="stage-select" aria-label="ステージをえらぶ">
          <button class="stage-choice selected" data-stage="0"><b>🌷</b><span>1 そうげん</span></button>
          <button class="stage-choice" data-stage="1"><b>🍭</b><span>2 おかし</span></button>
          <button class="stage-choice" data-stage="2"><b>🫧</b><span>3 みずうみ</span></button>
          <button class="stage-choice" data-stage="3"><b>🧸</b><span>4 おもちゃ</span></button>
          <button class="stage-choice" data-stage="4"><b>🌙</b><span>5 おしろ</span></button>
        </div>
        <button id="startBtn" class="primary">このステージで スタート！</button>
      </div>
    </section>

    <section id="resultScreen" class="screen hidden">
      <div class="panel">
        <div class="hero-face" id="resultFace">🐰🌈</div>
        <h1 id="resultTitle">ステージ クリア！</h1>
        <p id="resultText"></p>
        <button id="againBtn" class="primary">つぎのステージへ</button>
        <button id="retryBtn" class="secondary">このステージを もういちど</button>
      </div>
    </section>

    <div id="portraitTip"><div><b>↻</b>iPadを よこにして<br>あそんでね</div></div>
  </main>

    let platforms = [];
    let carrots = [];
    let shards = [];
    let enemies = [];
    let flowers = [];
    let hazards = [];
    let player;

    function resizeCanvas() {
      const rect = typeof canvas.getBoundingClientRect === 'function' ? canvas.getBoundingClientRect() : null;
      const cssWidth = (rect && rect.width) || window.innerWidth || 1280;
      const cssHeight = (rect && rect.height) || window.innerHeight || 720;
      const pixelRatio = Math.min(2, window.devicePixelRatio || 1);
      W = H * cssWidth / cssHeight;
      canvas.width = Math.round(W * pixelRatio);
      canvas.height = Math.round(H * pixelRatio);
      ctx.setTransform(pixelRatio,0,0,pixelRatio,0,0);
      ctx.imageSmoothingEnabled = true;
    }

    function resetGame() {
      const stage = STAGES[currentStage];
      worldEnd = stage.end;
      player = {
        x:170,y:514,w:50,h:76,vx:0,vy:0,face:1,onGround:true,coyote:.13,
        jumpBuffer:0,jumpCutLock:0,floatUsed:false,floatTime:0,hearts:3,invuln:0,
        carrots:0,shards:0,checkpoint:170,runTime:0,blink:0,riding:null
      };
      platforms = stage.platforms.map((p,i) => ({...p,baseX:p.x,baseY:p.y,phase:i*.67,dx:0,dy:0}));
      carrots = stage.carrots.map((p,i) => ({x:p[0],y:p[1],got:false,bob:i*.7}));
      shards = stage.shards.map((p,i) => ({x:p[0],y:p[1],got:false,bob:i*2}));
      enemies = stage.enemies.map((e,i) => ({...e,w:50,h:44,dir:i%2?1:-1,alive:true,t:0}));
      flowers = [...stage.decor];
      hazards = stage.hazards.map(h => ({x:h[0],y:h[1],w:h[2],h:h[3]}));
      particles = [];
      cameraX = 0;
      elapsed = 0;
      celebration = 0;
      hintTimer = currentStage===0 ? 8 : 0;
      rescueText = `ステージ ${currentStage+1}　${stage.name}`;
      rescueTimer = 3;
      input.left = input.right = input.jumpHeld = false;
    }

    function ensureAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function tone(freq, duration=.1, type='sine', volume=.055, delay=0) {
      if (muted || !audioCtx) return;
      const now = audioCtx.currentTime + delay;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, now);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(volume, now+.012);
      gain.gain.exponentialRampToValueAtTime(0.0001, now+duration);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(now); osc.stop(now+duration+.03);
    }

    function playJump(float=false) {
      tone(float?560:430,.11,'sine',.045);
      tone(float?740:590,.12,'sine',.035,.055);
    }
    function performSecondJump(p) {
      p.vy=-650;
      p.floatUsed=true;
      p.floatTime=.95;
      p.jumpBuffer=0;
      p.jumpCutLock=.18;
      playJump(true);
      burst(p.x+p.w/2,p.y+12,['#fff','#ffdcf0','#b7efff','#ffe56d'],14,145);
    }
    function playCarrot() { tone(700 + (player.carrots%6)*45,.09,'sine',.045); }
    function playShard() { [520,660,820,1040].forEach((n,i)=>tone(n,.22,'sine',.06,i*.08)); }
    function playOuch() { tone(190,.18,'triangle',.05); tone(145,.22,'triangle',.04,.07); }
    function playClear() { [523,659,784,1047].forEach((n,i)=>tone(n,.35,'sine',.07,i*.15)); }

    function startGame(stageIndex=selectedStage) {
      ensureAudio();
      currentStage = Math.max(0,Math.min(STAGES.length-1,stageIndex));
      selectedStage = currentStage;
      try { localStorage.setItem('mimiLastStage',String(selectedStage)); } catch (_) {}
      resetGame();
      state = 'playing';
      titleScreen.classList.add('hidden');
      resultScreen.classList.add('hidden');
      touchControls.style.display = '';
      tone(523,.12,'sine',.05); tone(784,.2,'sine',.05,.1);
    }

    function pressJump() {
      if (state !== 'playing') return;
      ensureAudio();
      input.jumpHeld = true;
      player.jumpBuffer = .2;
    }
    function releaseJump() {
      input.jumpHeld = false;
      if (player && player.vy < -270 && player.jumpCutLock<=0) player.vy *= .57;
    }

    function bindHold(button, key) {
      const down = e => {
        e.preventDefault(); ensureAudio(); input[key] = true; button.classList.add('pressed');
        button.setPointerCapture?.(e.pointerId);
      };
      const up = e => { e.preventDefault(); input[key] = false; button.classList.remove('pressed'); };
      button.addEventListener('pointerdown', down);
      button.addEventListener('pointerup', up);
      button.addEventListener('pointercancel', up);
      button.addEventListener('lostpointercapture', up);
    }
    bindHold(leftBtn,'left');
    bindHold(rightBtn,'right');
    jumpBtn.addEventListener('pointerdown', e => { e.preventDefault(); jumpBtn.classList.add('pressed'); jumpBtn.setPointerCapture?.(e.pointerId); pressJump(); });
    ['pointerup','pointercancel','lostpointercapture'].forEach(name => jumpBtn.addEventListener(name, e => { e.preventDefault(); jumpBtn.classList.remove('pressed'); releaseJump(); }));

    function updateStageSelection() {
      stageButtons.forEach((button,i)=>button.classList.toggle('selected',i===selectedStage));
    }
    stageButtons.forEach((button,i)=>button.addEventListener('click',()=>{selectedStage=i;updateStageSelection();}));
    updateStageSelection();
    document.getElementById('startBtn').addEventListener('click', () => startGame(selectedStage));
    againBtn.addEventListener('click', () => startGame(currentStage<STAGES.length-1 ? currentStage+1 : 0));
    retryBtn.addEventListener('click', () => startGame(currentStage));
    soundBtn.addEventListener('click', () => {
      ensureAudio(); muted = !muted; soundBtn.textContent = muted ? '×' : '♪';
      soundBtn.setAttribute('aria-label', muted ? '音を出す' : '音を消す');
      if (!muted) tone(660,.12,'sine',.05);
    });

    addEventListener('keydown', e => {
      if (['ArrowLeft','ArrowRight','ArrowUp','Space','KeyA','KeyD','KeyW'].includes(e.code)) e.preventDefault();
      if (e.code==='ArrowLeft'||e.code==='KeyA') input.left=true;
      if (e.code==='ArrowRight'||e.code==='KeyD') input.right=true;
      if ((e.code==='ArrowUp'||e.code==='Space'||e.code==='KeyW')&&!e.repeat) pressJump();
      if (e.code==='Enter' && state!=='playing') startGame(selectedStage);
    });
    addEventListener('keyup', e => {
      if (e.code==='ArrowLeft'||e.code==='KeyA') input.left=false;
      if (e.code==='ArrowRight'||e.code==='KeyD') input.right=false;
      if (e.code==='ArrowUp'||e.code==='Space'||e.code==='KeyW') releaseJump();
    });
    addEventListener('blur', () => { input.left=input.right=input.jumpHeld=false; });
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('gesturestart', e => e.preventDefault());

    function approach(value,target,amount) {
      return value < target ? Math.min(value+amount,target) : Math.max(value-amount,target);
    }
    function overlap(ax,ay,aw,ah,bx,by,bw,bh) {
      return ax<bx+bw && ax+aw>bx && ay<by+bh && ay+ah>by;
    }

    function burst(x,y,colors,count=10,speed=180) {
      for (let i=0;i<count;i++) {
        const a = Math.random()*Math.PI*2;
        const s = speed*(.35+Math.random()*.75);
        particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-50,life:.55+Math.random()*.45,size:5+Math.random()*7,color:colors[i%colors.length],star:i%3===0});
      }
    }

    function respawn(message='ふわふわバブルが たすけてくれた！') {
      player.x = player.checkpoint;
      player.y = 420;
      player.vx = 0;
      player.vy = -120;
      player.invuln = 2.2;
      player.floatUsed = false;
      player.hearts = Math.max(player.hearts,2);
      rescueText = message;
      rescueTimer = 2.1;
      cameraX = Math.max(0,player.x-360);
      burst(player.x+25,player.y+35,['#fff','#9eefff','#ffbfe6'],18,150);
      tone(420,.18,'sine',.05); tone(620,.24,'sine',.05,.12);
    }

    function hurt(enemy) {
      if (player.invuln>0) return;
      player.hearts--;
      player.invuln = 1.8;
      player.vx = player.x < enemy.x ? -310 : 310;
      player.vy = -420;
      burst(player.x+25,player.y+30,['#fff','#ffaad5','#ffe875'],12,190);
      playOuch();
      rescueText = player.hearts>0 ? 'だいじょうぶ！ ゆっくり いこう' : 'ミミ、もういちど いってみよう！';
      rescueTimer = 1.6;
      if (player.hearts<=0) {
        player.hearts=3;
        setTimeout(() => { if (state==='playing') respawn('ハート いっぱいで さいかい！'); },260);
      }
    }

    function finish() {
      if (state!=='playing') return;
      state='clear';
      celebration=0;
      input.left=input.right=input.jumpHeld=false;
      touchControls.style.display='none';
      playClear();
      const all = player.shards===3;
      const finalStage = currentStage===STAGES.length-1;
      resultTitle.textContent = finalStage ? 'ぜんステージ クリア！' : `ステージ ${currentStage+1} クリア！`;
      resultText.innerHTML = `にじのカケラは <b>${player.shards}こ</b>、<br>にんじんは <b>${player.carrots}ほん</b> みつけたよ！<br>${all?'ぜんぶ見つけたね。すごい！':'まだ ひみつが かくれているかも？'}`;
      againBtn.textContent = finalStage ? 'ステージ1から あそぶ' : `つぎは ${STAGES[currentStage+1].icon} ${STAGES[currentStage+1].name}`;
      try { localStorage.setItem('mimiLastStage',String(finalStage?0:currentStage+1)); } catch (_) {}
      setTimeout(()=>resultScreen.classList.remove('hidden'),1300);
    }

    function update(dt) {
      elapsed += dt;
      rescueTimer = Math.max(0,rescueTimer-dt);
      hintTimer = Math.max(0,hintTimer-dt);

      for (const p of particles) {
        p.life -= dt; p.x += p.vx*dt; p.y += p.vy*dt; p.vy += 500*dt; p.vx *= .99;
      }
      particles = particles.filter(p=>p.life>0);

      if (state==='clear') {
        celebration += dt;
        if (Math.random()<dt*14) burst(cameraX+W*(.2+Math.random()*.65),110+Math.random()*320,['#ff6fad','#ffe55c','#74dfc1','#8dc8ff','#fff'],8,150);
        return;
      }
      if (state!=='playing') return;

      const p = player;
      const stage = STAGES[currentStage];
      for (const plat of platforms) {
        const nextX = plat.baseX + (plat.moveX ? Math.sin(elapsed*plat.moveSpeed+plat.phase)*plat.moveX : 0);
        const nextY = plat.baseY + (plat.moveY ? Math.sin(elapsed*plat.moveSpeed+plat.phase)*plat.moveY : 0);
        plat.dx = nextX-plat.x; plat.dy = nextY-plat.y;
        plat.x=nextX; plat.y=nextY;
        if (p.riding===plat && p.onGround) { p.x+=plat.dx; p.y+=plat.dy; }
      }
      p.invuln = Math.max(0,p.invuln-dt);
      p.jumpBuffer = Math.max(0,p.jumpBuffer-dt);
      p.jumpCutLock = Math.max(0,p.jumpCutLock-dt);
      p.coyote = p.onGround ? .13 : Math.max(0,p.coyote-dt);
      p.runTime += Math.abs(p.vx)*dt*.018;

      const move = (input.right?1:0)-(input.left?1:0);
      if (move) p.face=move;
      const target = move*350;
      p.vx = approach(p.vx,target,(p.onGround?2550:1650)*dt);
      if (!move && p.onGround) p.vx = approach(p.vx,0,2900*dt);

      if (p.jumpBuffer>0) {
        if (p.coyote>0) {
          p.vy=-715; p.onGround=false; p.coyote=0; p.jumpBuffer=0; p.jumpCutLock=.12; p.floatUsed=false; playJump(false);
          burst(p.x+p.w/2,p.y+p.h,['#fff','#ffd2e9'],6,80);
        } else if (!p.floatUsed) {
          performSecondJump(p);
        }
      }

      if (!p.onGround && input.jumpHeld && !p.floatUsed && p.coyote<=0 && p.vy>-70) {
        performSecondJump(p);
      }

      if (p.floatTime>0) p.floatTime-=dt;
      const gravity = p.floatTime>0 && input.jumpHeld && p.vy>0 ? 420 : 1850;
      p.vy = Math.min(980,p.vy+gravity*dt);
      p.x = Math.max(0,Math.min(worldEnd-p.w,p.x+p.vx*dt));
      const oldBottom = p.y+p.h;
      p.y += p.vy*dt;
      p.onGround=false;
      p.riding=null;
      if (p.vy>=0) {
        let landing=null;
        for (const plat of platforms) {
          if (p.x+p.w>plat.x+5 && p.x<plat.x+plat.w-5 && oldBottom<=plat.y+8 && p.y+p.h>=plat.y) {
            if (!landing || plat.y<landing.y) landing=plat;
          }
        }
        if (landing) {
          p.y=landing.y-p.h; p.vy=0; p.onGround=true; p.riding=landing; p.floatUsed=false; p.floatTime=0;
          if (landing.conveyor) p.x+=landing.conveyor*dt;
          if (landing.kind==='jelly') {
            p.vy=-835; p.onGround=false; p.riding=null;
            burst(p.x+p.w/2,landing.y,['#fff','#ff9fd0','#ffe76e'],8,110);
            tone(360,.08,'sine',.04);tone(640,.13,'sine',.04,.05);
          }
        }
      }

      for (const cp of stage.checkpoints) if (p.x>cp[0]) p.checkpoint=Math.max(p.checkpoint,cp[1]);
      if (p.y>760) { respawn(); return; }

      for (const c of carrots) {
        if (!c.got && overlap(p.x,p.y,p.w,p.h,c.x-15,c.y-24,30,38)) {
          c.got=true; p.carrots++; playCarrot(); burst(c.x,c.y,['#ff8a34','#ffd34e','#71db85'],7,100);
        }
      }
      for (const s of shards) {
        if (!s.got && overlap(p.x,p.y,p.w,p.h,s.x-24,s.y-28,48,56)) {
          s.got=true; p.shards++; playShard(); burst(s.x,s.y,['#ff79b7','#ffe45f','#65e0c0','#78bfff','#fff'],22,210);
          rescueText=`にじのカケラ ${p.shards}こめ！`;
          rescueTimer=2;
        }
      }

      for (const e of enemies) {
        if (!e.alive) continue;
        e.t+=dt; e.x+=e.dir*(e.type==='hedge'?48:62)*stage.enemySpeed*dt;
        if (e.x<e.min) {e.x=e.min;e.dir=1;} if (e.x>e.max){e.x=e.max;e.dir=-1;}
        if (overlap(p.x+5,p.y+4,p.w-10,p.h-4,e.x,e.y,e.w,e.h)) {
          if (p.vy>90 && oldBottom<=e.y+20 && e.type!=='hedge') {
            e.alive=false; p.vy=-470; p.floatUsed=false;
            burst(e.x+25,e.y+20,['#fff','#ffd265','#9ee8cf'],14,165);
            tone(300,.08,'square',.035); tone(520,.12,'sine',.04,.05);
          } else hurt(e);
        }
      }

      for (const h of hazards) {
        if (overlap(p.x+7,p.y+8,p.w-14,p.h-4,h.x,h.y,h.w,h.h)) {
          hurt({x:h.x+h.w/2});
          if (p.vy>0) p.vy=-500;
        }
      }

      if (p.x>stage.goal) finish();
      const camTarget=Math.max(0,Math.min(worldEnd-W,p.x-350));
      cameraX += (camTarget-cameraX)*Math.min(1,dt*4.8);
    }

    function rr(x,y,w,h,r) {
      r=Math.min(r,w/2,h/2);
      ctx.beginPath();ctx.roundRect(x,y,w,h,r);ctx.closePath();
    }
    function starPath(x,y,r1,r2,n=5,rot=-Math.PI/2) {
      ctx.beginPath();
      for(let i=0;i<n*2;i++){
        const a=rot+i*Math.PI/n, r=i%2?r2:r1;
        const px=x+Math.cos(a)*r, py=y+Math.sin(a)*r;
        i?ctx.lineTo(px,py):ctx.moveTo(px,py);
      }
      ctx.closePath();
    }

    function drawBackground() {
      const theme=STAGES[currentStage].theme;
      const pal=palettes[theme];
      const sky=ctx.createLinearGradient(0,0,0,H);
      sky.addColorStop(0,pal.sky1);sky.addColorStop(.65,pal.sky2);sky.addColorStop(1,theme==='moon'?'#c99bc5':'#ffe3f1');
      ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);

      if(theme==='moon'){
        ctx.fillStyle='rgba(255,244,170,.9)';
        for(let i=0;i<32;i++){const x=((i*173-cameraX*.08+60)%(W+100))-50,y=45+(i*71)%300;starPath(x,y,3+(i%3),1.5+(i%2),5);ctx.fill();}
        ctx.fillStyle='#fff4bd';ctx.beginPath();ctx.arc(W-130,115,70,0,Math.PI*2);ctx.fill();ctx.fillStyle=pal.sky1;ctx.beginPath();ctx.arc(W-100,90,66,0,Math.PI*2);ctx.fill();
      }else{
        ctx.fillStyle='rgba(255,255,255,.78)';
        for(let i=0;i<10;i++){
          const x=((i*286-cameraX*.12+160)%(W+380))-190;
          const y=75+(i%3)*70;
          ctx.beginPath();ctx.arc(x,y,37,0,Math.PI*2);ctx.arc(x+43,y-16,49,0,Math.PI*2);ctx.arc(x+91,y+2,34,0,Math.PI*2);ctx.fill();
        }
      }
      ctx.fillStyle=pal.hill1;
      ctx.beginPath();ctx.moveTo(0,430);
      for(let x=-100;x<=W+120;x+=120){const wx=x+cameraX*.2;ctx.quadraticCurveTo(x+60,315+Math.sin(wx*.002)*50,x+120,430);}ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.fill();
      ctx.fillStyle=pal.hill2;
      ctx.beginPath();ctx.moveTo(0,495);
      for(let x=-100;x<=W+120;x+=100){const wx=x+cameraX*.34;ctx.quadraticCurveTo(x+50,380+Math.sin(wx*.003)*42,x+100,495);}ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.fill();

      for(let i=0;i<28;i++){
        const x=i*330-cameraX*.55+100;
        if(x<-100||x>W+100)continue;
        if(theme==='candy'){
          ctx.fillStyle='#fff1cd';rr(x-7,405,14,112,7);ctx.fill();ctx.strokeStyle='#ff83b7';ctx.lineWidth=6;ctx.beginPath();ctx.moveTo(x-7,430);ctx.lineTo(x+7,445);ctx.moveTo(x-7,465);ctx.lineTo(x+7,480);ctx.stroke();
          ctx.fillStyle=i%2?'#ff79b4':'#a77de8';ctx.beginPath();ctx.arc(x,390,47,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#fff3a6';ctx.lineWidth=7;ctx.beginPath();ctx.arc(x,390,29,0,Math.PI*1.6);ctx.stroke();
        }else if(theme==='toy'){
          const colors=['#f47f9e','#68c9e5','#f4cc55'];ctx.fillStyle=colors[i%3];rr(x-48,405,96,112,10);ctx.fill();ctx.fillStyle='rgba(255,255,255,.75)';rr(x-30,425,24,30,5);ctx.fill();rr(x+10,425,24,30,5);ctx.fill();ctx.fillStyle='#8e6291';rr(x-10,472,22,45,5);ctx.fill();
        }else if(theme==='lake'){
          ctx.strokeStyle='#4bad8f';ctx.lineWidth=8;for(let j=-2;j<=2;j++){ctx.beginPath();ctx.moveTo(x+j*12,520);ctx.quadraticCurveTo(x+j*14-8,470,x+j*11,430-(j%2)*18);ctx.stroke();}ctx.fillStyle='rgba(190,249,247,.65)';ctx.beginPath();ctx.arc(x+32,410,17,0,Math.PI*2);ctx.arc(x-28,455,10,0,Math.PI*2);ctx.fill();
        }else if(theme==='moon'){
          ctx.fillStyle='#3e3b69';rr(x-38,400,76,120,8);ctx.fill();ctx.beginPath();ctx.moveTo(x-48,405);ctx.lineTo(x,350);ctx.lineTo(x+48,405);ctx.fill();ctx.fillStyle='#ffe57b';rr(x-20,430,15,25,6);ctx.fill();rr(x+8,430,15,25,6);ctx.fill();
        }else{
          ctx.fillStyle='#a87a63';rr(x-8,420,16,100,8);ctx.fill();ctx.fillStyle=i%2?'#f7a7ca':'#96dfa9';ctx.beginPath();ctx.arc(x,402,55,0,Math.PI*2);ctx.arc(x-38,425,40,0,Math.PI*2);ctx.arc(x+41,425,42,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,255,255,.7)';for(let j=0;j<5;j++){ctx.beginPath();ctx.arc(x-34+j*17,397+(j%2)*18,5,0,Math.PI*2);ctx.fill();}
        }
      }
    }

    function drawWorld() {
      const cx=cameraX;
      const stage=STAGES[currentStage],theme=stage.theme,pal=palettes[theme];
      ctx.fillStyle=pal.water;ctx.fillRect(0,615,W,H-615);
      ctx.strokeStyle='rgba(255,255,255,.75)';ctx.lineWidth=4;
      ctx.beginPath();
      for(let x=-40;x<W+40;x+=34){const y=625+Math.sin((x+elapsed*90)*.045)*5;ctx.moveTo(x,y);ctx.quadraticCurveTo(x+17,y-8,x+34,y);}ctx.stroke();

      for (const p of platforms) {
        const x=p.x-cx;if(x+p.w<-20||x>W+20)continue;
        ctx.fillStyle=p.kind==='jelly'?'#f884bd':pal.soil;rr(x,p.y,p.w,p.h,12);ctx.fill();
        if (p.h > 60) {
          ctx.fillStyle=pal.dot;
          for(let tx=x+25;tx<x+p.w;tx+=62){ctx.beginPath();ctx.arc(tx,p.y+65+(tx%3)*9,7,0,Math.PI*2);ctx.fill();}
        }
        ctx.fillStyle=p.kind==='jelly'?'#ffb8dd':pal.grass;rr(x-3,p.y-10,p.w+6,24,12);ctx.fill();
        ctx.fillStyle=p.kind==='jelly'?'#fff1a0':pal.top;rr(x,p.y-10,p.w,10,8);ctx.fill();
        ctx.fillStyle=theme==='moon'?'#ffe57a':'#fff1a3';
        for(let fx=x+36;fx<x+p.w-20;fx+=95){ctx.beginPath();ctx.arc(fx,p.y-13,4,0,Math.PI*2);ctx.arc(fx+6,p.y-17,4,0,Math.PI*2);ctx.arc(fx+12,p.y-13,4,0,Math.PI*2);ctx.fill();}
        if(p.conveyor){ctx.fillStyle='rgba(255,255,255,.85)';ctx.font='900 18px sans-serif';ctx.textAlign='center';for(let ax=x+30;ax<x+p.w-15;ax+=42)ctx.fillText(p.conveyor>0?'›':'‹',ax,p.y+9);}
      }

      for(const wx of flowers){
        const x=wx-cx;if(x<-80||x>W+80)continue;
        ctx.strokeStyle='#5cae6d';ctx.lineWidth=9;ctx.beginPath();ctx.moveTo(x,590);ctx.quadraticCurveTo(x-8,555,x,525);ctx.stroke();
        ctx.fillStyle=pal.accent;
        for(let i=0;i<6;i++){const a=i*Math.PI/3;ctx.beginPath();ctx.ellipse(x+Math.cos(a)*20,520+Math.sin(a)*15,18,11,a,0,Math.PI*2);ctx.fill();}
        ctx.fillStyle='#ffe56d';ctx.beginPath();ctx.arc(x,520,13,0,Math.PI*2);ctx.fill();
      }

      for(const h of hazards){
        const x=h.x-cx;if(x+h.w<0||x>W)continue;ctx.fillStyle=theme==='moon'?'#ffe16d':'#ff739d';
        const count=Math.max(2,Math.floor(h.w/24));for(let i=0;i<count;i++){const sx=x+i*h.w/count;ctx.beginPath();ctx.moveTo(sx,h.y+h.h);ctx.lineTo(sx+h.w/count/2,h.y);ctx.lineTo(sx+h.w/count,h.y+h.h);ctx.fill();}
      }

      for(const c of carrots){if(c.got)continue;const x=c.x-cx;if(x<-40||x>W+40)continue;drawCarrot(x,c.y+Math.sin(elapsed*3+c.bob)*6);}
      for(const s of shards){if(s.got)continue;const x=s.x-cx;if(x<-50||x>W+50)continue;drawShard(x,s.y+Math.sin(elapsed*2.2+s.bob)*8);}
      for(const e of enemies){if(!e.alive)continue;const x=e.x-cx;if(x<-80||x>W+80)continue;drawEnemy(e,x,e.y);}

      drawGoal(stage.goal+90-cx,590);
      drawBunny(player.x-cx,player.y,player);

      for(const p of particles){
        const x=p.x-cx;if(x<-30||x>W+30)continue;ctx.globalAlpha=Math.max(0,p.life*1.5);ctx.fillStyle=p.color;
        if(p.star){starPath(x,p.y,p.size,p.size*.45);ctx.fill();}else{ctx.beginPath();ctx.arc(x,p.y,p.size,0,Math.PI*2);ctx.fill();}
      }
      ctx.globalAlpha=1;
    }

    function drawCarrot(x,y){
      ctx.save();ctx.translate(x,y);ctx.rotate(Math.sin(elapsed*2+x)*.08);
      ctx.fillStyle='#64bd70';ctx.beginPath();ctx.ellipse(-6,-14,7,15,-.5,0,Math.PI*2);ctx.ellipse(6,-14,7,15,.5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#ff8b39';ctx.beginPath();ctx.moveTo(-13,-7);ctx.quadraticCurveTo(0,38,13,-7);ctx.quadraticCurveTo(0,-14,-13,-7);ctx.fill();
      ctx.strokeStyle='#d9652c';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(-7,5);ctx.lineTo(4,9);ctx.moveTo(-4,17);ctx.lineTo(5,20);ctx.stroke();ctx.restore();
    }
    function drawShard(x,y){
      ctx.save();ctx.translate(x,y);ctx.rotate(elapsed*.8);
      ctx.shadowColor='#fff';ctx.shadowBlur=22;
      const g=ctx.createLinearGradient(-24,-24,24,24);g.addColorStop(0,'#ff72b5');g.addColorStop(.25,'#ffe45d');g.addColorStop(.5,'#61ddb8');g.addColorStop(.75,'#68b9ff');g.addColorStop(1,'#b07aff');
      ctx.fillStyle=g;starPath(0,0,28,14,6);ctx.fill();ctx.shadowBlur=0;
      ctx.fillStyle='rgba(255,255,255,.8)';starPath(-6,-7,7,3,5);ctx.fill();ctx.restore();
    }
    function drawEnemy(e,x,y){
      const bounce=Math.sin(e.t*6)*2;ctx.save();ctx.translate(x+25,y+22+bounce);ctx.scale(e.dir,1);
      if(e.type==='slime'){
        ctx.fillStyle='#9be5d1';ctx.beginPath();ctx.moveTo(-24,20);ctx.quadraticCurveTo(-29,-18,0,-21);ctx.quadraticCurveTo(29,-18,24,20);ctx.closePath();ctx.fill();
        ctx.fillStyle='#49726e';ctx.beginPath();ctx.arc(-8,-2,3,0,Math.PI*2);ctx.arc(8,-2,3,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#49726e';ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,4,7,.1,Math.PI-.1);ctx.stroke();
      }else if(e.type==='hedge'){
        ctx.fillStyle='#a87962';for(let i=0;i<7;i++){const a=-2.8+i*.48;ctx.beginPath();ctx.moveTo(Math.cos(a)*12,Math.sin(a)*12);ctx.lineTo(Math.cos(a)*30,Math.sin(a)*30);ctx.lineTo(Math.cos(a+.28)*14,Math.sin(a+.28)*14);ctx.fill();}
        ctx.fillStyle='#f2c8a3';ctx.beginPath();ctx.ellipse(3,2,22,19,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#513f40';ctx.beginPath();ctx.arc(11,-2,3,0,Math.PI*2);ctx.arc(24,5,4,0,Math.PI*2);ctx.fill();
      }else{
        ctx.fillStyle='#f4bc6f';ctx.beginPath();ctx.ellipse(0,3,24,21,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.moveTo(-18,-10);ctx.lineTo(-14,-28);ctx.lineTo(-3,-15);ctx.moveTo(18,-10);ctx.lineTo(14,-28);ctx.lineTo(3,-15);ctx.fill();
        ctx.fillStyle='#694d49';ctx.beginPath();ctx.arc(-8,0,3,0,Math.PI*2);ctx.arc(8,0,3,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#694d49';ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,7,6,0,Math.PI);ctx.stroke();
      }
      ctx.restore();
    }

    function drawBunny(x,y,p){
      if(p.invuln>0 && Math.floor(p.invuln*12)%2===0)ctx.globalAlpha=.38;
      const run=p.onGround&&Math.abs(p.vx)>30?Math.sin(p.runTime):0;
      const squash=p.onGround?Math.abs(run)*.025:Math.min(.08,Math.abs(p.vy)*.00008);
      ctx.save();ctx.translate(x+p.w/2,y+p.h/2);ctx.scale(p.face,1);ctx.scale(1+squash,1-squash);
      ctx.fillStyle='#fffaf8';
      ctx.save();ctx.rotate(-.1+run*.03);ctx.beginPath();ctx.ellipse(-12,-45,10,31,-.11,0,Math.PI*2);ctx.fill();ctx.restore();
      ctx.save();ctx.rotate(.1-run*.03);ctx.beginPath();ctx.ellipse(12,-45,10,31,.11,0,Math.PI*2);ctx.fill();ctx.restore();
      ctx.fillStyle='#ffb4d2';ctx.beginPath();ctx.ellipse(-12,-47,4,22,-.1,0,Math.PI*2);ctx.ellipse(12,-47,4,22,.1,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fffaf8';ctx.beginPath();ctx.ellipse(0,-15,25,24,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#f47eb6';rr(-22,5,44,39,17);ctx.fill();
      ctx.fillStyle='#fffaf8';ctx.beginPath();ctx.ellipse(-17,34+run*2,11,8,run*.18,0,Math.PI*2);ctx.ellipse(17,34-run*2,11,8,-run*.18,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#5e4659';ctx.beginPath();ctx.arc(-8,-19,3.2,0,Math.PI*2);ctx.arc(8,-19,3.2,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#ff91ba';ctx.beginPath();ctx.arc(0,-11,3.5,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#8a5d75';ctx.lineWidth=2;ctx.beginPath();ctx.arc(-4,-7,5,0,1.1);ctx.arc(4,-7,5,2.05,Math.PI);ctx.stroke();
      ctx.fillStyle='rgba(255,151,184,.35)';ctx.beginPath();ctx.arc(-15,-10,6,0,Math.PI*2);ctx.arc(15,-10,6,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#ff62a5';ctx.beginPath();ctx.ellipse(-20,-31,10,7,-.35,0,Math.PI*2);ctx.ellipse(-5,-32,10,7,.35,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ffd95e';ctx.beginPath();ctx.arc(-12,-31,4,0,Math.PI*2);ctx.fill();
      if(p.floatTime>0){ctx.strokeStyle='rgba(255,255,255,.9)';ctx.lineWidth=4;ctx.beginPath();ctx.arc(0,-5,40+Math.sin(elapsed*8)*3,0,Math.PI*2);ctx.stroke();}
      ctx.restore();ctx.globalAlpha=1;
    }

    function drawGoal(x,y){
      if(x<-150||x>W+160)return;
      ctx.lineWidth=18;ctx.lineCap='round';
      ['#ff72a9','#ffd85e','#66d9a7','#6ebeff','#aa83e8'].forEach((c,i)=>{ctx.strokeStyle=c;ctx.beginPath();ctx.arc(x,560,92-i*10,Math.PI,Math.PI*2);ctx.stroke();});
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(x-92,564,25,0,Math.PI*2);ctx.arc(x-66,568,29,0,Math.PI*2);ctx.arc(x+92,564,25,0,Math.PI*2);ctx.arc(x+66,568,29,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff8ae';starPath(x,438,24,11);ctx.fill();
      ctx.fillStyle='#844f77';ctx.font='900 20px "Hiragino Maru Gothic ProN",sans-serif';ctx.textAlign='center';ctx.fillText('ゴール！',x,535);
    }

    function drawHud(){
      if(state==='title')return;
      ctx.save();
      ctx.fillStyle='rgba(255,255,255,.86)';rr(24,20,265,70,27);ctx.fill();
      ctx.fillStyle='#e65094';ctx.font='900 29px "Hiragino Maru Gothic ProN",sans-serif';ctx.textAlign='left';
      ctx.fillText('♥'.repeat(player.hearts),43,65);
      ctx.fillStyle='#ec7b32';ctx.font='900 24px "Hiragino Maru Gothic ProN",sans-serif';ctx.fillText(`🥕 ${player.carrots}`,175,64);
      ctx.fillStyle='rgba(255,255,255,.86)';rr(W/2-120,20,240,70,27);ctx.fill();
      for(let i=0;i<3;i++){
        ctx.fillStyle=i<player.shards?'#ff71b4':'#e2d9df';starPath(W/2-65+i*65,55,21,10,6);ctx.fill();
      }
      const progress=Math.min(1,player.x/STAGES[currentStage].goal);
      ctx.fillStyle='rgba(255,255,255,.65)';rr(320,101,W-640,14,7);ctx.fill();ctx.fillStyle='#ff72b3';rr(320,101,(W-640)*progress,14,7);ctx.fill();
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(320+(W-640)*progress,108,13,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ff84bc';ctx.beginPath();ctx.arc(320+(W-640)*progress,108,7,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=STAGES[currentStage].theme==='moon'?'#fff':'#76536f';ctx.textAlign='center';ctx.font='900 17px "Hiragino Maru Gothic ProN",sans-serif';ctx.fillText(`${STAGES[currentStage].icon} ${currentStage+1}　${STAGES[currentStage].name}`,W/2,142);
      if(hintTimer>0&&state==='playing'){
        const alpha=Math.min(1,hintTimer)*.92;ctx.globalAlpha=alpha;ctx.fillStyle='rgba(102,71,101,.82)';rr(W/2-238,155,476,50,22);ctx.fill();
        ctx.fillStyle='#fff';ctx.textAlign='center';ctx.font='900 20px "Hiragino Maru Gothic ProN",sans-serif';ctx.fillText('ジャンプは おしっぱなしでも 2だんジャンプ！',W/2,188);
      }
      if(rescueTimer>0){
        const messageY=hintTimer>0?220:170;
        ctx.globalAlpha=Math.min(1,rescueTimer*2);ctx.fillStyle='rgba(255,255,255,.94)';rr(W/2-260,messageY,520,58,25);ctx.fill();
        ctx.fillStyle='#bd4d88';ctx.textAlign='center';ctx.font='900 22px "Hiragino Maru Gothic ProN",sans-serif';ctx.fillText(rescueText,W/2,messageY+37);
      }
      ctx.restore();
    }

    function draw(){drawBackground();drawWorld();drawHud();}

    let last=performance.now(),acc=0;
    function frame(now){
      let dt=Math.min(.05,(now-last)/1000);last=now;acc+=dt;
      while(acc>=1/120){update(1/120);acc-=1/120;}
      draw();requestAnimationFrame(frame);
    }
    addEventListener('resize',resizeCanvas);
    resizeCanvas();
    resetGame();requestAnimationFrame(frame);
  })();
  </script>
</body>
</html>
