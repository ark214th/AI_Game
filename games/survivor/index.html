<!doctype html><html lang='ja'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover'><meta name='apple-mobile-web-app-capable' content='yes'><meta name='theme-color' content='#080b1e'><title>月影サバイバー</title><link rel='stylesheet' href='style.css'></head><body><canvas id='game'></canvas><div id='hud' class='hidden'><div class='row'><div class='panel stats'><div class='labels'><span>❤️ HP</span><b id='hpt'>100 / 100</b></div><div class='bar'><i id='hp'></i></div><div class='xp'><div class='labels'><span>✨ LV.<b id='lv'>1</b></span><span id='xpt'>0 / 8</span></div><div class='bar'><i id='xp'></i></div></div></div><div class='panel time'><span>TIME</span><b id='tm'>05:00</b><span>K.O.</span><b id='ko'>0</b></div><button id='pause'>Ⅱ</button></div><div id='weapons'></div><div id='boss'>宵闇の王<div class='bar'><i id='bossbar'></i></div></div><div id='notice'></div></div><div id='joy' class='hidden'><div id='stick'></div></div>
<div id='start' class='overlay'><div class='modal'><div style='font-size:65px'>🌙</div><h1>月影サバイバー</h1><p class='sub'>押し寄せる魔物をかわし、5分間の夜を生き残ろう</p><div class='guide'><div><b>🕹️</b>左下をドラッグして移動</div><div><b>✨</b>攻撃はすべて自動</div><div><b>⬆️</b>宝石を集めて強化</div></div><button id='startBtn' class='main'>ゲーム開始</button><div class='links'><button id='sound'>🔊 効果音 ON</button><a href='../../'>ゲーム一覧へ戻る</a></div></div></div>
<div id='level' class='overlay hidden'><div class='modal'><h2>LEVEL UP!</h2><p class='sub'>強化をひとつ選んでください</p><div id='cards'></div></div></div><div id='paused' class='overlay hidden'><div class='modal'><h2>一時停止</h2><p class='sub'>少し休んでも、夜は逃げません。</p><button id='resume' class='main'>再開する</button></div></div><div id='end' class='overlay hidden'><div class='modal'><div id='endico' style='font-size:65px'>🌅</div><h2 id='endtitle'>夜明けです！</h2><p id='endtext' class='sub'></p><div class='results'><div><b id='restime'>05:00</b><span>生存時間</span></div><div><b id='resko'>0</b><span>撃破数</span></div><div><b id='reslv'>1</b><span>到達レベル</span></div></div><button id='retry' class='main'>もう一度遊ぶ</button><div class='links'><a href='../../'>ゲーム一覧へ戻る</a></div></div></div>
<script src='game.js'></script></body></html>
