<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#080b1e">
  <title>月影サバイバー</title>
  <style>
    :root {
      color-scheme: dark;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #080b1e;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      overscroll-behavior: none;
    }
    body { position: fixed; inset: 0; }
    canvas { display: block; width: 100%; height: 100%; touch-action: none; }

    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      padding: calc(10px + var(--safe-top)) calc(12px + var(--safe-right)) calc(10px + var(--safe-bottom)) calc(12px + var(--safe-left));
      z-index: 4;
    }
    .top-row { display: flex; align-items: flex-start; gap: 10px; }
    .panel {
      background: rgba(9, 12, 34, .72);
      border: 1px solid rgba(220, 226, 255, .18);
      border-radius: 13px;
      box-shadow: 0 8px 26px rgba(0,0,0,.22);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .stats { min-width: 178px; padding: 8px 10px; }
    .label-row { display: flex; justify-content: space-between; gap: 12px; font-size: 12px; color: #dce3ff; margin-bottom: 5px; }
    .bar { height: 11px; background: rgba(255,255,255,.12); border-radius: 999px; overflow: hidden; border: 1px solid rgba(255,255,255,.12); }
    .bar > i { display:block; height:100%; width:100%; border-radius:inherit; transition: width .15s linear; }
    #hpFill { background: linear-gradient(90deg,#ff5577,#ff9a67); }
    #xpFill { background: linear-gradient(90deg,#5eb9ff,#b66dff); }
    .xp-wrap { margin-top: 7px; }
    .right-stats { margin-left: auto; padding: 8px 11px; display:grid; grid-template-columns:auto auto; column-gap:14px; row-gap:3px; font-size:13px; }
    .right-stats b { text-align:right; color:#fff4ad; font-variant-numeric: tabular-nums; }
    #pauseBtn {
      pointer-events: auto;
      width: 42px; height: 42px; border: 0; border-radius: 13px;
      color: white; font-size: 18px; font-weight: 800;
      background: rgba(9, 12, 34, .78);
      border: 1px solid rgba(220, 226, 255, .2);
    }
    #bossWrap { display:none; position:absolute; left:50%; transform:translateX(-50%); top:calc(84px + var(--safe-top)); width:min(520px,72vw); text-align:center; }
    #bossName { font-size:12px; font-weight:800; color:#ffd5f2; text-shadow:0 2px 6px #000; margin-bottom:4px; letter-spacing:.08em; }
    #bossFill { background:linear-gradient(90deg,#b630ff,#ff3c79); }
    #notice { position:absolute; top:calc(118px + var(--safe-top)); left:50%; transform:translateX(-50%); font-size:18px; font-weight:900; color:#fff3bd; text-shadow:0 3px 10px #000; opacity:0; transition:opacity .3s; white-space:nowrap; }
    #hint { position:absolute; bottom:calc(18px + var(--safe-bottom)); right:calc(14px + var(--safe-right)); font-size:11px; color:rgba(238,241,255,.65); text-shadow:0 2px 4px #000; }

    #joystick {
      position:fixed; z-index:6; width:142px; height:142px;
      left:calc(22px + var(--safe-left)); bottom:calc(24px + var(--safe-bottom));
      border-radius:50%; pointer-events:none; opacity:.78;
      background:radial-gradient(circle,rgba(160,173,255,.10) 0 32%,rgba(160,173,255,.18) 33% 36%,rgba(8,12,35,.38) 37% 100%);
      border:2px solid rgba(204,214,255,.24);
      box-shadow:0 12px 40px rgba(0,0,0,.25), inset 0 0 26px rgba(116,132,255,.12);
    }
    #stick { position:absolute; left:41px; top:41px; width:58px; height:58px; border-radius:50%; background:rgba(215,222,255,.62); border:2px solid rgba(255,255,255,.45); box-shadow:0 4px 16px rgba(0,0,0,.32); transform:translate(0,0); }

    .overlay {
      position:fixed; inset:0; z-index:10; display:flex; align-items:center; justify-content:center;
      padding:calc(24px + var(--safe-top)) calc(20px + var(--safe-right)) calc(24px + var(--safe-bottom)) calc(20px + var(--safe-left));
      background:radial-gradient(circle at 50% 35%,rgba(44,38,101,.78),rgba(5,7,21,.94));
      touch-action:manipulation;
    }
    .hidden { display:none !important; }
    .modal { width:min(720px,100%); max-height:100%; overflow:auto; text-align:center; padding:clamp(20px,4vw,40px); border-radius:26px; background:linear-gradient(160deg,rgba(29,31,72,.97),rgba(11,13,39,.97)); border:1px solid rgba(221,224,255,.22); box-shadow:0 28px 80px rgba(0,0,0,.5); }
    h1 { margin:0 0 6px; font-size:clamp(34px,7vw,68px); line-height:1; letter-spacing:.03em; background:linear-gradient(180deg,#fff7ca,#ff93d1 55%,#9f86ff); -webkit-background-clip:text; background-clip:text; color:transparent; filter:drop-shadow(0 5px 14px rgba(0,0,0,.35)); }
    .subtitle { margin:0 0 22px; color:#bdc9ff; font-size:clamp(13px,2.4vw,17px); }
    .hero-icon { font-size:66px; filter:drop-shadow(0 6px 14px rgba(0,0,0,.4)); margin:4px 0 12px; }
    .instructions { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin:18px 0 22px; }
    .instruction { padding:13px 8px; border-radius:16px; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1); font-size:13px; color:#e5e9ff; }
    .instruction strong { display:block; font-size:24px; margin-bottom:5px; }
    button.primary { min-width:210px; padding:15px 24px; border:0; border-radius:999px; font-size:18px; font-weight:900; color:#17142d; background:linear-gradient(180deg,#fff4a8,#ffb5cf); box-shadow:0 8px 0 #9f5586,0 15px 30px rgba(0,0,0,.3); cursor:pointer; }
    button.primary:active { transform:translateY(5px); box-shadow:0 3px 0 #9f5586,0 8px 20px rgba(0,0,0,.3); }
    .small-links { margin-top:18px; display:flex; justify-content:center; gap:18px; flex-wrap:wrap; }
    .small-links a,.small-links button { color:#bcc9ff; background:none; border:0; font:inherit; text-decoration:underline; padding:6px; }

    #levelOverlay { background:rgba(5,7,22,.88); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); }
    #levelOverlay .modal { width:min(900px,100%); }
    #levelOverlay h2 { margin:0 0 6px; font-size:clamp(26px,5vw,42px); color:#fff3b6; }
    #levelOverlay p { margin:0 0 18px; color:#cbd2f5; }
    #upgradeCards { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
    .upgrade-card { text-align:left; min-height:180px; padding:18px; border-radius:19px; color:white; background:linear-gradient(155deg,rgba(83,91,171,.75),rgba(32,29,78,.92)); border:1px solid rgba(230,234,255,.25); box-shadow:0 10px 24px rgba(0,0,0,.25); }
    .upgrade-card:active { transform:scale(.98); }
    .upgrade-icon { font-size:38px; }
    .upgrade-card h3 { margin:8px 0 5px; color:#fff5bd; font-size:18px; }
    .upgrade-card p { margin:0; font-size:13px; line-height:1.55; color:#e1e6ff; }
    .upgrade-card small { display:inline-block; margin-top:9px; color:#a9b7ff; }

    #pauseOverlay .modal, #endOverlay .modal { width:min(520px,100%); }
    #endTitle { font-size:42px; margin:0 0 8px; }
    #endText { color:#d8defe; line-height:1.7; }
    #resultGrid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin:18px 0 24px; }
    #resultGrid div { padding:12px 6px; border-radius:14px; background:rgba(255,255,255,.07); }
    #resultGrid b { display:block; font-size:22px; color:#fff0aa; }
    #resultGrid span { font-size:11px; color:#bac3ea; }

    @media (max-width: 650px), (max-height: 520px) {
      .instructions { grid-template-columns:1fr 1fr 1fr; margin:12px 0 16px; }
      .instruction { font-size:11px; padding:9px 5px; }
      .instruction strong { font-size:20px; }
      .modal { padding:18px; }
      #upgradeCards { gap:8px; }
      .upgrade-card { padding:12px; min-height:150px; }
      .upgrade-icon { font-size:30px; }
      .upgrade-card h3 { font-size:15px; }
      .upgrade-card p { font-size:11px; }
      #joystick { width:124px; height:124px; }
      #stick { left:36px; top:36px; width:50px; height:50px; }
      .right-stats { font-size:11px; }
    }
    @media (max-width: 560px) {
      #upgradeCards { grid-template-columns:1fr; }
      .upgrade-card { min-height:0; display:grid; grid-template-columns:48px 1fr; column-gap:8px; }
      .upgrade-icon { grid-row:1 / span 3; }
      .upgrade-card h3 { margin:2px 0 3px; }
      .upgrade-card small { margin-top:5px; }
      .stats { min-width:145px; }
      #hint { display:none; }
    }
  </style>
</head>
<body>
  <canvas id="game" aria-label="月影サバイバー ゲーム画面"></canvas>

  <div id="hud" class="hidden">
    <div class="top-row">
      <div class="panel stats">
        <div class="label-row"><span>❤️ HP</span><b id="hpText">100 / 100</b></div>
        <div class="bar"><i id="hpFill"></i></div>
        <div class="xp-wrap">
          <div class="label-row"><span>✨ LV.<b id="levelText">1</b></span><span id="xpText">0 / 8</span></div>
          <div class="bar"><i id="xpFill"></i></div>
        </div>
      </div>
      <div class="panel right-stats">
        <span>TIME</span><b id="timeText">05:00</b>
        <span>K.O.</span><b id="killText">0</b>
      </div>
      <button id="pauseBtn" aria-label="一時停止">Ⅱ</button>
    </div>
    <div id="bossWrap">
      <div id="bossName">宵闇の王</div>
      <div class="bar"><i id="bossFill"></i></div>
    </div>
    <div id="notice"></div>
    <div id="hint">左下をドラッグして移動・攻撃は自動</div>
  </div>

  <div id="joystick" class="hidden" aria-hidden="true"><div id="stick"></div></div>

  <div id="startOverlay" class="overlay">
    <div class="modal">
      <div class="hero-icon">🌙</div>
      <h1>月影サバイバー</h1>
      <p class="subtitle">迫りくる魔物をかわし、5分間の夜を生き残ろう</p>
      <div class="instructions">
        <div class="instruction"><strong>🕹️</strong>左下をドラッグ<br>して移動</div>
        <div class="instruction"><strong>✨</strong>攻撃はすべて<br>自動</div>
        <div class="instruction"><strong>⬆️</strong>宝石を集めて<br>能力強化</div>
      </div>
      <button id="startBtn" class="primary">ゲーム開始</button>
      <div class="small-links">
        <button id="soundBtn">🔊 効果音 ON</button>
        <a href="../../">ゲーム一覧へ戻る</a>
      </div>
    </div>
  </div>

  <div id="levelOverlay" class="overlay hidden">
    <div class="modal">
      <h2>LEVEL UP!</h2>
      <p>強化をひとつ選んでください</p>
      <div id="upgradeCards"></div>
    </div>
  </div>

  <div id="pauseOverlay" class="overlay hidden">
    <div class="modal">
      <h2>一時停止</h2>
      <p>少し休んでも、夜は逃げません。</p>
      <button id="resumeBtn" class="primary">再開する</button>
      <div class="small-links"><a href="../../">ゲーム一覧へ戻る</a></div>
    </div>
  </div>

  <div id="endOverlay" class="overlay hidden">
    <div class="modal">
      <div id="endIcon" class="hero-icon">🌅</div>
      <h2 id="endTitle">夜明けです！</h2>
      <p id="endText">宵闇を越えて生き残りました。</p>
      <div id="resultGrid">
        <div><b id="resultTime">05:00</b><span>生存時間</span></div>
        <div><b id="resultKills">0</b><span>撃破数</span></div>
        <div><b id="resultLevel">1</b><span>到達レベル</span></div>
      </div>
      <button id="retryBtn" class="primary">もう一度遊ぶ</button>
      <div class="small-links"><a href="../../">ゲーム一覧へ戻る</a></div>
    </div>
  </div>

<script>
(() => {
  'use strict';

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d', { alpha: false, desynchronized: true });
  const ui = {
    hud: document.getElementById('hud'), joystick: document.getElementById('joystick'), stick: document.getElementById('stick'),
    startOverlay: document.getElementById('startOverlay'), levelOverlay: document.getElementById('levelOverlay'),
    pauseOverlay: document.getElementById('pauseOverlay'), endOverlay: document.getElementById('endOverlay'),
    startBtn: document.getElementById('startBtn'), pauseBtn: document.getElementById('pauseBtn'), resumeBtn: document.getElementById('resumeBtn'),
    retryBtn: document.getElementById('retryBtn'), soundBtn: document.getElementById('soundBtn'), cards: document.getElementById('upgradeCards'),
    hpText: document.getElementById('hpText'), hpFill: document.getElementById('hpFill'), xpText: document.getElementById('xpText'),
    xpFill: document.getElementById('xpFill'), levelText: document.getElementById('levelText'), timeText: document.getElementById('timeText'),
    killText: document.getElementById('killText'), notice: document.getElementById('notice'), bossWrap: document.getElementById('bossWrap'),
    bossFill: document.getElementById('bossFill'), resultTime: document.getElementById('resultTime'), resultKills: document.getElementById('resultKills'),
    resultLevel: document.getElementById('resultLevel'), endTitle: document.getElementById('endTitle'), endText: document.getElementById('endText'),
    endIcon: document.getElementById('endIcon')
  };

  const TAU = Math.PI * 2;
  const GAME_TIME = 300;
  const BOSS_TIME = 240;
  let W = 0, H = 0, DPR = 1;
  let running = false, paused = false, choosing = false, ended = false;
  let lastTime = 0, elapsed = 0, spawnClock = 0, boss = null, bossSpawned = false;
  let enemies = [], projectiles = [], gems = [], particles = [], damageTexts = [];
  let kills = 0, shake = 0, noticeTimer = 0, soundOn = true, audioCtx = null;
  let keys = Object.create(null);
  let pointerId = null, joyX = 0, joyY = 0;

  const player = {
    x: 0, y: 0, r: 19, speed: 195,
    hp: 100, maxHp: 100, invuln: 0, regen: 0,
    level: 1, xp: 0, nextXp: 8, magnet: 95,
    damage: 15, cooldown: .7, shotTimer: 0, projectileCount: 1, projectileSpeed: 470, pierce: 0,
    crit: .05, critDamage: 1.8,
    orbs: 0, orbitDamage: 13, orbitSpeed: 1.8,
    nova: 0, novaDamage: 32, novaCooldown: 7.5, novaTimer: 5,
    armor: 0, pickupHeal: 0
  };

  const upgradeDefs = [
    { id:'moon', icon:'🌙', name:'月光弾', max:7, level:0, desc:() => upgradeDefs[0].level === 0 ? '近い敵へ月光弾を自動で放つ。' : '弾数・威力・連射性能を強化する。', apply(){ this.level++; player.damage += 5; player.cooldown = Math.max(.24, player.cooldown * .88); if ([2,4,6].includes(this.level)) player.projectileCount++; if (this.level >= 5) player.pierce = 1; } },
    { id:'orbit', icon:'🪐', name:'守護星', max:5, level:0, desc:() => upgradeDefs[1].level === 0 ? '周囲を回る星が敵を傷つける。' : '守護星の数と威力を増やす。', apply(){ this.level++; player.orbs++; player.orbitDamage += 6; } },
    { id:'nova', icon:'❄️', name:'星霜の波', max:5, level:0, desc:() => upgradeDefs[2].level === 0 ? '一定時間ごとに周囲へ冷気を放つ。' : '冷気の威力を増やし、間隔を短くする。', apply(){ this.level++; player.nova = this.level; player.novaDamage += 18; player.novaCooldown = Math.max(3.5, player.novaCooldown - .75); player.novaTimer = Math.min(player.novaTimer, 2); } },
    { id:'boots', icon:'👢', name:'風渡りの靴', max:5, level:0, desc:() => '移動速度を12%上げる。', apply(){ this.level++; player.speed *= 1.12; } },
    { id:'heart', icon:'💖', name:'生命のしずく', max:5, level:0, desc:() => '最大HPを25増やし、HPを回復する。', apply(){ this.level++; player.maxHp += 25; player.hp = Math.min(player.maxHp, player.hp + 35); } },
    { id:'magnet', icon:'🧲', name:'星の引力', max:5, level:0, desc:() => '経験値宝石を引き寄せる範囲を広げる。', apply(){ this.level++; player.magnet += 55; } },
    { id:'crit', icon:'🎯', name:'銀の照準', max:5, level:0, desc:() => 'クリティカル率とクリティカル威力を上げる。', apply(){ this.level++; player.crit += .09; player.critDamage += .12; } },
    { id:'regen', icon:'🌿', name:'月桂樹', max:4, level:0, desc:() => '毎秒少しずつHPを回復する。', apply(){ this.level++; player.regen += .65; } },
    { id:'armor', icon:'🛡️', name:'夜銀の鎧', max:4, level:0, desc:() => '敵から受けるダメージを軽減する。', apply(){ this.level++; player.armor += 2.2; } }
  ];

  function resize() {
    DPR = Math.min(2, window.devicePixelRatio || 1);
    W = Math.max(320, window.innerWidth);
    H = Math.max(320, window.innerHeight);
    canvas.width = Math.round(W * DPR);
    canvas.height = Math.round(H * DPR);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }

  function resetGame() {
    elapsed = 0; spawnClock = 0; kills = 0; boss = null; bossSpawned = false; ended = false; paused = false; choosing = false;
    enemies = []; projectiles = []; gems = []; particles = []; damageTexts = [];
    Object.assign(player, {
      x:0,y:0,speed:195,hp:100,maxHp:100,invuln:0,regen:0,level:1,xp:0,nextXp:8,magnet:95,
      damage:15,cooldown:.7,shotTimer:.12,projectileCount:1,projectileSpeed:470,pierce:0,crit:.05,critDamage:1.8,
      orbs:0,orbitDamage:13,orbitSpeed:1.8,nova:0,novaDamage:32,novaCooldown:7.5,novaTimer:5,armor:0,pickupHeal:0
    });
    for (const u of upgradeDefs) u.level = 0;
    upgradeDefs[0].level = 1;
    joyX = joyY = 0; updateStick();
    ui.bossWrap.style.display = 'none';
    updateHUD();
  }

  function startGame() {
    ensureAudio();
    resetGame();
    ui.startOverlay.classList.add('hidden');
    ui.endOverlay.classList.add('hidden');
    ui.pauseOverlay.classList.add('hidden');
    ui.hud.classList.remove('hidden');
    ui.joystick.classList.remove('hidden');
    running = true;
    lastTime = performance.now();
    showNotice('夜が始まった…', 2.2);
    tryFullscreen();
    requestAnimationFrame(loop);
  }

  function tryFullscreen() {
    const el = document.documentElement;
    if (el.requestFullscreen && !document.fullscreenElement) el.requestFullscreen().catch(() => {});
  }

  function ensureAudio() {
    if (!soundOn) return;
    try {
      audioCtx ||= new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    } catch (_) { soundOn = false; }
  }

  function beep(freq=440, duration=.05, type='sine', volume=.035) {
    if (!soundOn || !audioCtx) return;
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type; osc.frequency.setValueAtTime(freq, t);
    gain.gain.setValueAtTime(volume, t); gain.gain.exponentialRampToValueAtTime(.0001, t + duration);
    osc.connect(gain); gain.connect(audioCtx.destination); osc.start(t); osc.stop(t + duration);
  }

  function rand(a,b){ return a + Math.random() * (b-a); }
  function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
  function dist2(a,b){ const x=a.x-b.x,y=a.y-b.y; return x*x+y*y; }
  function circleHit(a,b){ const r=a.r+b.r; return dist2(a,b) < r*r; }

  function spawnEnemy(type) {
    if (enemies.length > 190) return;
    const angle = Math.random() * TAU;
    const margin = Math.max(W,H) * .58 + rand(90,190);
    const e = { x:player.x + Math.cos(angle)*margin, y:player.y + Math.sin(angle)*margin, hitFlash:0, touchCd:0, orbitCd:0, dead:false };
    if (type === 'bat') Object.assign(e,{type,r:13,hp:20,maxHp:20,speed:92,damage:9,xp:1,color:'#a978ff'});
    else if (type === 'skeleton') Object.assign(e,{type,r:17,hp:42,maxHp:42,speed:55,damage:13,xp:2,color:'#d8dddb'});
    else if (type === 'brute') Object.assign(e,{type,r:28,hp:125,maxHp:125,speed:34,damage:22,xp:5,color:'#d96374'});
    else Object.assign(e,{type:'slime',r:16,hp:31,maxHp:31,speed:47,damage:10,xp:1,color:'#69d69a'});
    const scale = 1 + Math.max(0,elapsed-45) / 520;
    e.hp *= scale; e.maxHp=e.hp; e.damage *= 1 + elapsed/800; e.speed *= 1 + Math.min(.22,elapsed/1200);
    enemies.push(e);
  }

  function spawnBoss() {
    bossSpawned = true;
    const angle = Math.random()*TAU, d=Math.max(W,H)*.6+170;
    boss = { type:'boss', x:player.x+Math.cos(angle)*d, y:player.y+Math.sin(angle)*d, r:54, hp:2400, maxHp:2400, speed:29, damage:30, xp:40, color:'#b738d3', hitFlash:0, touchCd:0, orbitCd:0, dead:false, pulse:0 };
    enemies.push(boss); ui.bossWrap.style.display='block'; showNotice('⚠ 宵闇の王が現れた！',3); beep(110,.5,'sawtooth',.07);
  }

  function updateSpawns(dt) {
    if (!bossSpawned && elapsed >= BOSS_TIME) spawnBoss();
    spawnClock -= dt;
    if (spawnClock > 0) return;
    const intensity = 1 + elapsed/75;
    const count = Math.min(6, 1 + Math.floor(elapsed/62));
    for (let i=0;i<count;i++) {
      const roll=Math.random();
      if (elapsed>145 && roll<.12) spawnEnemy('brute');
      else if (elapsed>55 && roll<.34) spawnEnemy('skeleton');
      else if (elapsed>18 && roll<.62) spawnEnemy('bat');
      else spawnEnemy('slime');
    }
    spawnClock = Math.max(.16, .72/intensity + rand(-.08,.08));
  }

  function nearestEnemies(count, range=650) {
    const maxD=range*range;
    return enemies.filter(e=>!e.dead && dist2(e,player)<maxD).sort((a,b)=>dist2(a,player)-dist2(b,player)).slice(0,count);
  }

  function fireWeapon() {
    const targets = nearestEnemies(player.projectileCount, 620);
    if (!targets.length) return;
    for (let i=0;i<player.projectileCount;i++) {
      const target=targets[i%targets.length];
      const ang=Math.atan2(target.y-player.y,target.x-player.x)+(i-targets.length/2)*.035;
      const crit=Math.random()<player.crit;
      projectiles.push({x:player.x,y:player.y,r:6,vx:Math.cos(ang)*player.projectileSpeed,vy:Math.sin(ang)*player.projectileSpeed,life:1.5,damage:player.damage*(crit?player.critDamage:1),pierce:player.pierce,crit});
    }
    beep(690,.035,'triangle',.018);
  }

  function doNova() {
    const radius = 145 + player.nova*18;
    particles.push({type:'ring',x:player.x,y:player.y,r:15,maxR:radius,life:.55,maxLife:.55,color:'#9be7ff'});
    for (const e of enemies) if (!e.dead && dist2(e,player)<(radius+e.r)*(radius+e.r)) damageEnemy(e,player.novaDamage,false);
    showNotice('星霜の波！',.7); beep(240,.28,'sine',.055);
  }

  function damageEnemy(e, amount, crit=false) {
    if (e.dead) return;
    e.hp -= amount; e.hitFlash=.09;
    damageTexts.push({x:e.x,y:e.y-e.r,text:Math.round(amount),life:.55,crit});
    for(let i=0;i<2;i++) particles.push({type:'spark',x:e.x,y:e.y,vx:rand(-70,70),vy:rand(-70,70),life:.22,maxLife:.22,color:crit?'#fff0a1':'#cfe8ff'});
    if (e.hp<=0) killEnemy(e);
  }

  function killEnemy(e) {
    e.dead=true; kills++; shake=Math.max(shake,e.type==='boss'?13:2.5);
    const gemCount=e.type==='boss'?18:Math.max(1,Math.ceil(e.xp/3));
    for(let i=0;i<gemCount;i++) gems.push({x:e.x+rand(-12,12),y:e.y+rand(-12,12),r:e.type==='boss'?7:5,value:e.xp/gemCount,vx:rand(-35,35),vy:rand(-35,35),life:0});
    for(let i=0;i<(e.type==='boss'?50:8);i++) particles.push({type:'spark',x:e.x,y:e.y,vx:rand(-180,180),vy:rand(-180,180),life:rand(.35,.9),maxLife:.9,color:e.color});
    if(e.type==='boss'){ boss=null; ui.bossWrap.style.display='none'; showNotice('宵闇の王を倒した！',2.5); beep(880,.55,'triangle',.08); }
    else if(kills%40===0) beep(520,.08,'square',.025);
  }

  function gainXp(value) {
    player.xp += value;
    beep(980,.025,'sine',.012);
    if (player.xp >= player.nextXp && !choosing) {
      player.xp -= player.nextXp;
      player.level++;
      player.nextXp = Math.floor(8 + player.level*3.6 + Math.pow(player.level,1.25));
      openUpgrade();
    }
  }

  function openUpgrade() {
    choosing=true; paused=true; ui.levelOverlay.classList.remove('hidden');
    const available=upgradeDefs.filter(u=>u.level<u.max);
    const picks=[];
    while(picks.length<Math.min(3,available.length)){
      const u=available[Math.floor(Math.random()*available.length)];
      if(!picks.includes(u)) picks.push(u);
    }
    ui.cards.innerHTML='';
    for(const u of picks){
      const btn=document.createElement('button'); btn.className='upgrade-card';
      btn.innerHTML=`<span class="upgrade-icon">${u.icon}</span><h3>${u.name}</h3><p>${u.desc()}</p><small>現在 Lv.${u.level} → Lv.${u.level+1}</small>`;
      btn.addEventListener('click',()=>{ ensureAudio(); u.apply(); ui.levelOverlay.classList.add('hidden'); choosing=false; paused=false; updateHUD(); beep(520,.12,'triangle',.05); lastTime=performance.now(); });
      ui.cards.appendChild(btn);
    }
  }

  function update(dt) {
    elapsed += dt;
    if (elapsed >= GAME_TIME && !boss) return finish(true);
    if (player.invuln>0) player.invuln-=dt;
    if (player.regen>0) player.hp=Math.min(player.maxHp,player.hp+player.regen*dt);
    if (noticeTimer>0){ noticeTimer-=dt; if(noticeTimer<=0) ui.notice.style.opacity=0; }

    let mx=joyX+(keys.ArrowRight||keys.d?1:0)-(keys.ArrowLeft||keys.a?1:0);
    let my=joyY+(keys.ArrowDown||keys.s?1:0)-(keys.ArrowUp||keys.w?1:0);
    const ml=Math.hypot(mx,my); if(ml>1){mx/=ml;my/=ml;}
    player.x += mx*player.speed*dt; player.y += my*player.speed*dt;

    player.shotTimer-=dt; if(player.shotTimer<=0){ fireWeapon(); player.shotTimer=player.cooldown; }
    if(player.nova){ player.novaTimer-=dt; if(player.novaTimer<=0){doNova();player.novaTimer=player.novaCooldown;} }

    updateSpawns(dt);

    const orbitPositions=[];
    for(let i=0;i<player.orbs;i++){
      const angle=elapsed*player.orbitSpeed+i*TAU/player.orbs;
      orbitPositions.push({x:player.x+Math.cos(angle)*(63+player.orbs*2),y:player.y+Math.sin(angle)*(63+player.orbs*2),r:10});
    }

    for(const e of enemies){
      if(e.dead) continue;
      e.hitFlash=Math.max(0,e.hitFlash-dt); e.touchCd=Math.max(0,e.touchCd-dt); e.orbitCd=Math.max(0,e.orbitCd-dt);
      const dx=player.x-e.x,dy=player.y-e.y,d=Math.hypot(dx,dy)||1;
      const speed=e.speed*(e.type==='bat'?(1+.12*Math.sin(elapsed*7+e.x)):1);
      e.x+=dx/d*speed*dt; e.y+=dy/d*speed*dt;
      if(e.type==='boss') e.pulse+=dt;
      if(circleHit(e,player) && e.touchCd<=0){
        const dmg=Math.max(1,e.damage-player.armor);
        if(player.invuln<=0){ player.hp-=dmg; player.invuln=.42; shake=8; damageTexts.push({x:player.x,y:player.y-25,text:'-'+Math.round(dmg),life:.8,crit:true,player:true}); beep(90,.16,'sawtooth',.055); if(player.hp<=0) return finish(false); }
        e.touchCd=.55;
      }
      if(e.orbitCd<=0) for(const o of orbitPositions) if(circleHit(e,o)){ damageEnemy(e,player.orbitDamage,false); e.orbitCd=.28; break; }
    }

    for(const p of projectiles){
      p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;
      if(p.life<=0) continue;
      for(const e of enemies){
        if(e.dead||p.life<=0) continue;
        if(circleHit(p,e)){ damageEnemy(e,p.damage,p.crit); if(p.pierce>0)p.pierce--;else p.life=0; }
      }
    }

    for(const g of gems){
      g.life+=dt;
      const dx=player.x-g.x,dy=player.y-g.y,d=Math.hypot(dx,dy)||1;
      if(d<player.magnet){ const pull=260+(player.magnet-d)*5; g.vx+=dx/d*pull*dt;g.vy+=dy/d*pull*dt; }
      g.vx*=Math.pow(.03,dt);g.vy*=Math.pow(.03,dt);g.x+=g.vx*dt;g.y+=g.vy*dt;
      if(d<player.r+g.r+5){g.dead=true;gainXp(g.value);}
    }

    for(const p of particles){p.life-=dt;if(p.type==='spark'){p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=.96;p.vy*=.96;}else p.r+=(p.maxR-p.r)*Math.min(1,dt*8);}
    for(const t of damageTexts){t.life-=dt;t.y-=28*dt;}
    enemies=enemies.filter(e=>!e.dead && dist2(e,player)<2200*2200);
    projectiles=projectiles.filter(p=>p.life>0);
    gems=gems.filter(g=>!g.dead && g.life<50);
    particles=particles.filter(p=>p.life>0);
    damageTexts=damageTexts.filter(t=>t.life>0);
    shake*=Math.pow(.02,dt);
    updateHUD();
  }

  function finish(victory) {
    if(ended) return; ended=true; running=false; paused=true;
    ui.hud.classList.add('hidden');ui.joystick.classList.add('hidden');ui.endOverlay.classList.remove('hidden');
    ui.endIcon.textContent=victory?'🌅':'🌑'; ui.endTitle.textContent=victory?'夜明けです！':'力尽きました…';
    ui.endText.textContent=victory?'宵闇を越えて、5分間の夜を生き残りました。':'集めた力は消えません。次はもっと遠くまで進めるはずです。';
    ui.resultTime.textContent=formatTime(elapsed,true);ui.resultKills.textContent=kills;ui.resultLevel.textContent=player.level;
    beep(victory?740:120,victory?.7:.5,victory?'triangle':'sawtooth',.07);
  }

  function updateHUD(){
    ui.hpText.textContent=`${Math.max(0,Math.ceil(player.hp))} / ${Math.ceil(player.maxHp)}`;
    ui.hpFill.style.width=clamp(player.hp/player.maxHp*100,0,100)+'%';
    ui.xpText.textContent=`${Math.floor(player.xp)} / ${player.nextXp}`;ui.xpFill.style.width=clamp(player.xp/player.nextXp*100,0,100)+'%';
    ui.levelText.textContent=player.level;ui.killText.textContent=kills;ui.timeText.textContent=formatTime(Math.max(0,GAME_TIME-elapsed));
    if(boss&&!boss.dead) ui.bossFill.style.width=clamp(boss.hp/boss.maxHp*100,0,100)+'%';
  }

  function formatTime(sec, elapsedMode=false){
    sec=elapsedMode?Math.min(GAME_TIME,sec):sec;
    const m=Math.floor(sec/60),s=Math.floor(sec%60);return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }

  function showNotice(text,duration=1.5){ui.notice.textContent=text;ui.notice.style.opacity=1;noticeTimer=duration;}

  function worldToScreen(x,y){return {x:x-player.x+W/2,y:y-player.y+H/2};}

  function drawBackground() {
    const grd=ctx.createRadialGradient(W*.5,H*.45,20,W*.5,H*.5,Math.max(W,H)*.75);
    grd.addColorStop(0,'#171b42');grd.addColorStop(.58,'#0e1231');grd.addColorStop(1,'#07091c');ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);
    const grid=96,ox=(((-player.x*.35)%grid)+grid)%grid,oy=(((-player.y*.35)%grid)+grid)%grid;
    ctx.strokeStyle='rgba(135,150,224,.055)';ctx.lineWidth=1;ctx.beginPath();
    for(let x=ox;x<W;x+=grid){ctx.moveTo(x,0);ctx.lineTo(x,H);}for(let y=oy;y<H;y+=grid){ctx.moveTo(0,y);ctx.lineTo(W,y);}ctx.stroke();
    for(let i=0;i<46;i++){
      const sx=((i*197.3-player.x*.08)%(W+140)+W+140)%(W+140)-70;
      const sy=((i*i*51.7-player.y*.08)%(H+140)+H+140)%(H+140)-70;
      const tw=.35+.35*Math.sin(elapsed*1.7+i);ctx.fillStyle=`rgba(214,221,255,${tw})`;ctx.fillRect(sx,sy,i%7===0?2:1,i%7===0?2:1);
    }
  }

  function drawEnemy(e) {
    const s=worldToScreen(e.x,e.y); if(s.x<-80||s.x>W+80||s.y<-80||s.y>H+80)return;
    ctx.save();ctx.translate(s.x,s.y);const flash=e.hitFlash>0;ctx.fillStyle=flash?'#ffffff':e.color;ctx.strokeStyle='rgba(10,8,30,.85)';ctx.lineWidth=3;
    if(e.type==='slime'){
      ctx.beginPath();ctx.moveTo(-e.r,e.r*.55);ctx.quadraticCurveTo(-e.r*1.05,-e.r*.65,0,-e.r);ctx.quadraticCurveTo(e.r*1.05,-e.r*.65,e.r,e.r*.55);ctx.quadraticCurveTo(0,e.r*1.18,-e.r,e.r*.55);ctx.fill();ctx.stroke();
      ctx.fillStyle='#19202d';ctx.beginPath();ctx.arc(-5,-1,2.4,0,TAU);ctx.arc(5,-1,2.4,0,TAU);ctx.fill();
    } else if(e.type==='bat'){
      ctx.rotate(Math.sin(elapsed*10+e.x)*.12);ctx.beginPath();ctx.moveTo(0,-7);ctx.lineTo(-10,-13);ctx.lineTo(-e.r-8,Math.sin(elapsed*13+e.x)*7);ctx.lineTo(-10,8);ctx.lineTo(0,12);ctx.lineTo(10,8);ctx.lineTo(e.r+8,Math.sin(elapsed*13+e.x+2)*7);ctx.lineTo(10,-13);ctx.closePath();ctx.fill();ctx.stroke();ctx.fillStyle='#ffec75';ctx.fillRect(-6,-3,3,3);ctx.fillRect(3,-3,3,3);
    } else if(e.type==='skeleton'){
      ctx.beginPath();ctx.arc(0,-4,e.r*.76,0,TAU);ctx.fill();ctx.stroke();ctx.fillRect(-8,8,16,11);ctx.fillStyle='#22243c';ctx.beginPath();ctx.arc(-5,-6,3,0,TAU);ctx.arc(5,-6,3,0,TAU);ctx.fill();ctx.fillRect(-2,0,4,4);
    } else if(e.type==='brute'){
      ctx.beginPath();ctx.arc(0,0,e.r,0,TAU);ctx.fill();ctx.stroke();ctx.fillStyle='#ffe0b3';ctx.beginPath();ctx.arc(-9,-5,4,0,TAU);ctx.arc(9,-5,4,0,TAU);ctx.fill();ctx.strokeStyle='#4a1720';ctx.beginPath();ctx.moveTo(-12,10);ctx.lineTo(12,10);ctx.stroke();
    } else {
      const pulse=1+.05*Math.sin(e.pulse*4);ctx.scale(pulse,pulse);ctx.shadowColor='#d95cff';ctx.shadowBlur=24;ctx.beginPath();ctx.arc(0,0,e.r,0,TAU);ctx.fill();ctx.stroke();ctx.fillStyle='#1b0b30';ctx.beginPath();ctx.arc(-17,-8,7,0,TAU);ctx.arc(17,-8,7,0,TAU);ctx.fill();ctx.fillStyle='#ffdf70';ctx.beginPath();ctx.arc(-17,-8,3,0,TAU);ctx.arc(17,-8,3,0,TAU);ctx.fill();ctx.strokeStyle='#ff9bd8';ctx.lineWidth=5;ctx.beginPath();ctx.arc(0,6,24,.15*Math.PI,.85*Math.PI);ctx.stroke();
      for(let i=0;i<6;i++){const a=i*TAU/6+elapsed*.35;ctx.fillStyle='rgba(216,102,255,.55)';ctx.beginPath();ctx.arc(Math.cos(a)*72,Math.sin(a)*72,7,0,TAU);ctx.fill();}
    }
    if(e.hp<e.maxHp&&e.type!=='boss'){ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(-e.r, e.r+7,e.r*2,4);ctx.fillStyle='#ff617f';ctx.fillRect(-e.r,e.r+7,e.r*2*clamp(e.hp/e.maxHp,0,1),4);}
    ctx.restore();
  }

  function draw() {
    drawBackground();
    const sx=shake?rand(-shake,shake):0,sy=shake?rand(-shake,shake):0;ctx.save();ctx.translate(sx,sy);

    for(const g of gems){const s=worldToScreen(g.x,g.y);if(s.x<-20||s.x>W+20||s.y<-20||s.y>H+20)continue;ctx.save();ctx.translate(s.x,s.y);ctx.rotate(elapsed*2+g.x);ctx.fillStyle='#73d7ff';ctx.shadowColor='#7bdcff';ctx.shadowBlur=10;ctx.beginPath();ctx.moveTo(0,-g.r*1.45);ctx.lineTo(g.r,0);ctx.lineTo(0,g.r*1.45);ctx.lineTo(-g.r,0);ctx.closePath();ctx.fill();ctx.restore();}
    for(const e of enemies) if(!e.dead) drawEnemy(e);

    for(const p of projectiles){const s=worldToScreen(p.x,p.y);ctx.fillStyle=p.crit?'#fff1a0':'#c7b7ff';ctx.shadowColor=p.crit?'#ffd956':'#9278ff';ctx.shadowBlur=14;ctx.beginPath();ctx.arc(s.x,s.y,p.r,0,TAU);ctx.fill();}
    ctx.shadowBlur=0;

    for(let i=0;i<player.orbs;i++){const a=elapsed*player.orbitSpeed+i*TAU/player.orbs,s=worldToScreen(player.x+Math.cos(a)*(63+player.orbs*2),player.y+Math.sin(a)*(63+player.orbs*2));ctx.fillStyle='#ffec8d';ctx.shadowColor='#fff3aa';ctx.shadowBlur=18;ctx.beginPath();ctx.arc(s.x,s.y,10,0,TAU);ctx.fill();ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s.x-2,s.y-2,3,0,TAU);ctx.fill();}
    ctx.shadowBlur=0;

    const ps=worldToScreen(player.x,player.y);ctx.save();ctx.translate(ps.x,ps.y);if(player.invuln>0&&Math.floor(player.invuln*18)%2===0)ctx.globalAlpha=.35;
    ctx.shadowColor='#8aa1ff';ctx.shadowBlur=22;ctx.fillStyle='#e9e8ff';ctx.strokeStyle='#25234b';ctx.lineWidth=3;ctx.beginPath();ctx.arc(0,0,player.r,0,TAU);ctx.fill();ctx.stroke();ctx.shadowBlur=0;
    ctx.fillStyle='#5f54be';ctx.beginPath();ctx.moveTo(-15,12);ctx.quadraticCurveTo(0,29,15,12);ctx.lineTo(10,-2);ctx.lineTo(-10,-2);ctx.closePath();ctx.fill();
    ctx.fillStyle='#24233b';ctx.beginPath();ctx.arc(-6,-3,2.5,0,TAU);ctx.arc(6,-3,2.5,0,TAU);ctx.fill();ctx.fillStyle='#ffd769';ctx.beginPath();ctx.moveTo(0,-29);ctx.lineTo(5,-19);ctx.lineTo(15,-17);ctx.lineTo(7,-10);ctx.lineTo(9,0);ctx.lineTo(0,-5);ctx.lineTo(-9,0);ctx.lineTo(-7,-10);ctx.lineTo(-15,-17);ctx.lineTo(-5,-19);ctx.closePath();ctx.fill();ctx.restore();

    for(const p of particles){const s=worldToScreen(p.x,p.y),alpha=clamp(p.life/p.maxLife,0,1);ctx.globalAlpha=alpha;if(p.type==='ring'){ctx.strokeStyle=p.color;ctx.lineWidth=5*alpha;ctx.beginPath();ctx.arc(s.x,s.y,p.r,0,TAU);ctx.stroke();}else{ctx.fillStyle=p.color;ctx.fillRect(s.x-2,s.y-2,4,4);}}ctx.globalAlpha=1;
    for(const t of damageTexts){const s=worldToScreen(t.x,t.y);ctx.globalAlpha=clamp(t.life/.35,0,1);ctx.fillStyle=t.player?'#ff8097':t.crit?'#fff19d':'#f1f4ff';ctx.font=`900 ${t.crit?19:15}px -apple-system,sans-serif`;ctx.textAlign='center';ctx.strokeStyle='rgba(9,8,25,.85)';ctx.lineWidth=4;ctx.strokeText(t.text,s.x,s.y);ctx.fillText(t.text,s.x,s.y);}ctx.globalAlpha=1;
    ctx.restore();

    if(!running&&!ended){ctx.fillStyle='rgba(7,9,28,.32)';ctx.fillRect(0,0,W,H);}
  }

  function loop(now){
    if(!running)return;
    const dt=Math.min(.034,(now-lastTime)/1000||0);lastTime=now;
    if(!paused)update(dt);draw();requestAnimationFrame(loop);
  }

  function updateStick(){
    const max=42;ui.stick.style.transform=`translate(${joyX*max}px,${joyY*max}px)`;
  }
  function joystickFromEvent(e){
    const rect=ui.joystick.getBoundingClientRect(),cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
    let dx=e.clientX-cx,dy=e.clientY-cy;const max=rect.width*.34,d=Math.hypot(dx,dy);if(d>max){dx=dx/d*max;dy=dy/d*max;}joyX=dx/max;joyY=dy/max;updateStick();
  }

  window.addEventListener('pointerdown',e=>{
    if(!running||paused||pointerId!==null)return;
    const rect=ui.joystick.getBoundingClientRect();
    if(e.clientX<Math.max(rect.right+40,W*.55) && e.clientY>H*.35){pointerId=e.pointerId;joystickFromEvent(e);try{canvas.setPointerCapture(e.pointerId);}catch(_){}}
  },{passive:false});
  window.addEventListener('pointermove',e=>{if(e.pointerId===pointerId){e.preventDefault();joystickFromEvent(e);}},{passive:false});
  function releasePointer(e){if(e.pointerId===pointerId){pointerId=null;joyX=joyY=0;updateStick();}}
  window.addEventListener('pointerup',releasePointer);window.addEventListener('pointercancel',releasePointer);
  window.addEventListener('keydown',e=>{keys[e.key]=true;if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();});
  window.addEventListener('keyup',e=>{keys[e.key]=false;});
  window.addEventListener('contextmenu',e=>e.preventDefault());
  document.addEventListener('visibilitychange',()=>{if(document.hidden&&running&&!paused&&!choosing){paused=true;ui.pauseOverlay.classList.remove('hidden');}});

  ui.startBtn.addEventListener('click',startGame);ui.retryBtn.addEventListener('click',startGame);
  ui.pauseBtn.addEventListener('click',()=>{if(!running||choosing)return;paused=true;ui.pauseOverlay.classList.remove('hidden');joyX=joyY=0;updateStick();});
  ui.resumeBtn.addEventListener('click',()=>{ui.pauseOverlay.classList.add('hidden');paused=false;lastTime=performance.now();ensureAudio();});
  ui.soundBtn.addEventListener('click',()=>{soundOn=!soundOn;ui.soundBtn.textContent=soundOn?'🔊 効果音 ON':'🔇 効果音 OFF';if(soundOn)ensureAudio();});
  window.addEventListener('resize',resize,{passive:true});

  resize();resetGame();draw();
})();
</script>
